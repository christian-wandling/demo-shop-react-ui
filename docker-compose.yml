services:
  frontend-core:
    container_name: frontend-core
    command: npx nx serve ui --verbose
    build:
      context: .
      dockerfile: ./apps/ui/Dockerfile
      target: dev
    environment:
      - DEBUG=vite:*
      - API_URL=http://api-core:3000
      - NODE_ENV=development
      - KEYCLOAK_URL=http://localhost:8080
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '4200:4200'
    volumes:
      - ./apps/ui/src/:/app/src/
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 256M

networks:
  frontend-net:
    external: true
